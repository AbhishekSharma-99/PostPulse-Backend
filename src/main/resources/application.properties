# ── JWT (common across all profiles) ─────────────
app.jwt-secret=${JWT_SECRET_KEY:dGVzdFNlY3JldEtleVRoYXRJc0Jhc2U2NEVuY29kZWQ=}
app.jwt-expiration-milliseconds=${JWT_EXPIRATION_MILLISECONDS:604800000}

# ── Hibernate (Flyway owns schema everywhere) ─────
spring.jpa.hibernate.ddl-auto=validate

# ── Security Logging ──────────────────────────────
logging.level.org.springframework.security=INFO

# ── Standardized Error Responses (RFC 7807) ───────
spring.mvc.problemdetails.enabled=true