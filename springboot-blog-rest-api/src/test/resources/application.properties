# Test-specific configuration for H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate configuration for tests
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for debugging if needed)
spring.h2.console.enabled=true

# Logging for tests
logging.level.org.springframework.orm.jpa=DEBUG
logging.level.org.springframework.transaction=DEBUG
logging.level.org.hibernate.SQL=DEBUG


# JWT Configuration for Tests (ADD THIS)
# Production JWT Configuration
app.jwt-secret=YourActualProductionSecretKeyThatIsLongEnoughForSecurityPurposes1234567890
app-jwt-expiration-milliseconds=604800000